<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentOS Chat</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://*.vscode-cdn.net; style-src 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*;">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: var(--vscode-editor-background, #1e1e1e);
  --surface: var(--vscode-sideBar-background, var(--vscode-editor-background, #252526));
  --border: var(--vscode-panel-border, var(--vscode-editorWidget-border, #3d3d3d));
  --text: var(--vscode-editor-foreground, #d4d4d4);
  --text-muted: var(--vscode-descriptionForeground, var(--vscode-editor-foreground, #888));
  --primary: var(--vscode-button-background, #3794ff);
  --primary-foreground: var(--vscode-button-foreground, #fff);
  --user-bubble: var(--vscode-textBlockQuote-background, #2b5278);
  --assistant-bg: var(--vscode-textCodeBlock-background, var(--vscode-editor-background, #2d2d2d));
  --input-bg: var(--vscode-input-background, #3c3c3c);
  --input-foreground: var(--vscode-input-foreground, var(--vscode-editor-foreground, #d4d4d4));
  --danger: var(--vscode-errorForeground, #f85149);
  --success: #3fb950;
  --warning: #d29922;
  --inline-code-bg: var(--vscode-textCodeBlock-background, rgba(255,255,255,0.08));
}
body.vscode-dark {
  --user-bubble: #2b5278;
  --assistant-bg: #2d2d2d;
  --inline-code-bg: rgba(255,255,255,0.08);
}
body.vscode-light {
  --user-bubble: #d6eaff;
  --assistant-bg: #f3f3f3;
  --inline-code-bg: rgba(0,0,0,0.06);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#root { display: flex; flex-direction: column; height: 100vh; }
.chat-container { flex: 1; overflow-y: auto; padding: 12px 16px; scroll-behavior: smooth; }
.chat-container::-webkit-scrollbar { width: 8px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
.message { display: flex; gap: 10px; margin-bottom: 16px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; color: #fff; }
.avatar.user { background: #3794ff; }
.avatar.assistant { background: #52c41a; }
.avatar.system { background: #722ed1; }
.bubble { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.bubble.user { background: var(--user-bubble); color: var(--vscode-editor-foreground, #fff); border-bottom-right-radius: 2px; }
.bubble.assistant { background: var(--assistant-bg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
.header-info { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; color: var(--text-muted); }
.typing { display: inline-flex; align-items: center; gap: 4px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: typing 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }
.input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; align-items: flex-end; }
.input-area textarea { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 36px; max-height: 120px; }
.input-area textarea:focus { border-color: var(--primary); }
.input-area button { background: var(--primary); color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; height: 36px; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; }
.input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
.input-area button:hover:not(:disabled) { opacity: 0.85; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-state .title { font-size: 16px; margin-bottom: 4px; }
.empty-state .subtitle { font-size: 13px; }
.code-block { margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.code-block-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
.code-block-header .lang { font-weight: 600; text-transform: uppercase; font-size: 11px; }
.code-block-header .copy-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.code-block-header .copy-btn:hover { color: var(--text); border-color: var(--text-muted); }
.code-block pre { margin: 0; padding: 12px; overflow-x: auto; font-size: 13px; line-height: 1.5; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }
.code-block pre::-webkit-scrollbar { height: 6px; }
.code-block pre::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
.code-block .line-number { display: inline-block; width: 32px; text-align: right; padding-right: 12px; color: var(--text-muted); user-select: none; font-size: 12px; }
.mermaid-container { margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; padding: 12px; background: var(--surface); display: flex; justify-content: center; overflow: auto; }
.mermaid-container svg { max-width: 100%; height: auto; }
.mermaid-error { color: var(--danger); font-size: 13px; white-space: pre-wrap; padding: 8px; background: rgba(248,81,73,0.1); border-radius: 4px; width: 100%; }
.diff-container { margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
.markdown-content { line-height: 1.7; }
.markdown-content h1 { font-size: 1.5em; margin: 12px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.markdown-content h2 { font-size: 1.3em; margin: 10px 0 6px; }
.markdown-content h3 { font-size: 1.15em; margin: 8px 0 4px; }
.markdown-content p { margin: 6px 0; }
.markdown-content ul, .markdown-content ol { margin: 6px 0; padding-left: 24px; }
.markdown-content li { margin: 2px 0; }
.markdown-content blockquote { border-left: 3px solid var(--primary); padding-left: 12px; margin: 8px 0; color: var(--text-muted); }
.markdown-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.markdown-content th, .markdown-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.markdown-content th { background: var(--surface); font-weight: 600; }
.markdown-content code:not(.code-block code) { background: var(--inline-code-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }
.markdown-content a { color: var(--primary); text-decoration: none; }
.markdown-content a:hover { text-decoration: underline; }
.markdown-content img { max-width: 100%; border-radius: 4px; }
.markdown-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script>
window.__AGENTOS_CHAT_READY = false;
setTimeout(function() {
  if (!window.__AGENTOS_CHAT_READY) {
    document.getElementById('root').innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#888;font-family:sans-serif;padding:20px;">' +
      '<div style="font-size:48px;opacity:0.3;margin-bottom:12px;">&#x1F916;</div>' +
      '<div style="font-size:16px;margin-bottom:8px;">AgentOS Chat</div>' +
      '<div style="font-size:13px;color:#f85149;">加载聊天模块失败，请检查网络连接或查看控制台错误信息。</div>' +
      '</div>';
  }
}, 5000);
</script>
<script src="{{BUNDLE_SCRIPT_SRC}}"></script>
</body>
</html>
