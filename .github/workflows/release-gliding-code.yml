name: Release Gliding Code

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BINARY_NAME: glidingcode

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zigbuild: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_zigbuild: true

          - os: macos-latest
            target: aarch64-apple-darwin
            use_zigbuild: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ----- musl targets: toolchain setup -----
      - name: Install musl-gcc (x86_64 musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install zig & cargo-zigbuild (aarch64 musl)
        if: matrix.use_zigbuild
        run: |
          pip install cargo-zigbuild
          zig version

      # ----- protoc installation (platform-specific) -----
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          echo "PROTOC=$(which protoc)" >> $GITHUB_ENV
          protoc --version

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL https://github.com/protocolbuffers/protobuf/releases/download/v28.2/protoc-28.2-osx-universal_binary.zip -o /tmp/protoc.zip
          unzip -q /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> $GITHUB_PATH
          echo "PROTOC=/tmp/protoc/bin/protoc" >> $GITHUB_ENV
          /tmp/protoc/bin/protoc --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v28.2/protoc-28.2-win64.zip"
          $zip = "${{ runner.temp }}\protoc.zip"
          $dest = "${{ runner.temp }}\protoc"
          curl.exe -sSL $url -o $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $protocPath = "$dest\bin\protoc.exe"
          Add-Content -Path $env:GITHUB_PATH -Value "$dest\bin" -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "PROTOC=$protocPath" -Encoding utf8
          & $protocPath --version

      # ----- build -----
      - name: Set RUSTFLAGS for fully static musl linking
        if: contains(matrix.target, 'musl')
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

      - name: Build with zigbuild (aarch64 musl)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} --manifest-path apps/gliding_code/Cargo.toml

      - name: Build directly (all other targets)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }} --manifest-path apps/gliding_code/Cargo.toml

      # ----- verification -----
      - name: Verify static linking (Linux musl)
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          file "$BIN"
          ldd "$BIN" 2>&1 && echo "dynamic: linked to shared libraries" || echo "static: no dynamic dependencies"

      # ----- packaging -----
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: target/${{ matrix.target }}/release
        run: tar czvf ${{ github.workspace }}/glidingcode-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: target/${{ matrix.target }}/release
        run: Compress-Archive -Path ${{ env.BINARY_NAME }}.exe -DestinationPath ${{ github.workspace }}/glidingcode-${{ matrix.target }}.zip

      # ----- release upload -----
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            glidingcode-${{ matrix.target }}.tar.gz
            glidingcode-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
