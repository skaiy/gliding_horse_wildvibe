name: Release Gliding Code

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BINARY_NAME: glidingcode
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 musl：用 musl-gcc + cargo build
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zigbuild: false
            openssl_target: linux-x86_64
            openssl_cc: musl-gcc

          # aarch64 musl：用 zig + cargo-zigbuild
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_zigbuild: true
            openssl_target: linux-aarch64
            openssl_cc: zig cc -target aarch64-linux-musl

          # macOS (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      # ----- Rust toolchain -----
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ----- Cache -----
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-v2

      # ----- protoc (platform-specific) -----
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          echo "PROTOC=$(which protoc)" >> $GITHUB_ENV
          protoc --version

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL https://github.com/protocolbuffers/protobuf/releases/download/v28.2/protoc-28.2-osx-universal_binary.zip -o /tmp/protoc.zip
          unzip -q /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> $GITHUB_PATH
          echo "PROTOC=/tmp/protoc/bin/protoc" >> $GITHUB_ENV
          /tmp/protoc/bin/protoc --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v28.2/protoc-28.2-win64.zip"
          $zip = "${{ runner.temp }}\protoc.zip"
          $dest = "${{ runner.temp }}\protoc"
          curl.exe -sSL $url -o $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $p = "$dest\bin\protoc.exe"
          Add-Content -Path $env:GITHUB_PATH -Value "$dest\bin" -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "PROTOC=$p" -Encoding utf8
          & $p --version

      # ----- musl targets: cross toolchain -----
      - name: Install musl-gcc (x86_64 musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install zig & cargo-zigbuild (aarch64 musl)
        if: matrix.use_zigbuild
        run: pip install cargo-zigbuild && zig version

      # ----- musl targets: build OpenSSL from source (static) -----
      - name: Build OpenSSL static libs for musl
        if: contains(matrix.target, 'musl')
        run: |
          set -ex
          curl -sL https://github.com/openssl/openssl/releases/download/openssl-3.0.15/openssl-3.0.15.tar.gz | tar xz
          cd openssl-3.0.15
          CC="${{ matrix.openssl_cc }}" ./Configure ${{ matrix.openssl_target }} \
            no-shared no-tests no-dso no-engine no-ui-console \
            --prefix=${{ runner.temp }}/openssl-musl --openssldir=${{ runner.temp }}/openssl-musl
          make -j$(nproc) 2>&1 | tail -20
          make install_sw 2>&1 | tail -10
          ls -la ${{ runner.temp }}/openssl-musl/lib/libssl.a ${{ runner.temp }}/openssl-musl/lib/libcrypto.a

      # ----- musl targets: export OpenSSL env for openssl-sys -----
      - name: Export OpenSSL env (musl)
        if: contains(matrix.target, 'musl')
        run: |
          echo "OPENSSL_DIR=${{ runner.temp }}/openssl-musl" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      # ----- musl: fully static CRT (only for non-zigbuild) -----
      - name: Set RUSTFLAGS for fully static musl linking (non-zigbuild)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

      # ----- build -----
      - name: Build with zigbuild (aarch64 musl)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} --manifest-path apps/gliding_code/Cargo.toml

      - name: Build directly (all other targets)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }} --manifest-path apps/gliding_code/Cargo.toml

      # ----- verification -----
      - name: Verify static linking (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          file "$BIN"
          # ldd 对静态二进制会报非零退出（“not a dynamic executable”），以此判断为静态
          if ldd "$BIN" 2>&1 | grep -q "not a dynamic"; then
            echo "Static linking confirmed (ldd reports not a dynamic executable)."
          elif ldd "$BIN" >/dev/null 2>&1; then
            echo "WARNING: Dynamic dependencies detected."
            ldd "$BIN"
          else
            echo "Static linking confirmed (ldd returned non-zero)."
          fi

      # ----- packaging -----
      - name: Package tar.gz (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: target/${{ matrix.target }}/release
        run: tar czvf ${{ github.workspace }}/glidingcode-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: target/${{ matrix.target }}/release
        run: Compress-Archive -Path ${{ env.BINARY_NAME }}.exe -DestinationPath ${{ github.workspace }}/glidingcode-${{ matrix.target }}.zip

      # ----- release -----
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            glidingcode-${{ matrix.target }}.tar.gz
            glidingcode-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
